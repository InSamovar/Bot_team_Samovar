<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>План кухни</title>
    <link rel="stylesheet" href="styles.css?v=20260519-shared-json">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Samovar Kitchen</p>
          <h1>План на завтра</h1>
        </div>
        <button class="ghost-button" id="resetButton" type="button">Сбросить</button>
      </header>

      <nav class="view-tabs" aria-label="Mini App sections">
        <button class="view-tab" id="planViewButton" type="button" data-view-target="plan">План</button>
        <button class="view-tab" id="recipesViewButton" type="button" data-view-target="recipes">Рецепты</button>
        <button class="view-tab" id="productsViewButton" type="button" data-view-target="products">Products</button>
      </nav>

      <section class="section">
        <h2>Что готовим</h2>
        <div class="category-tabs" id="categoryTabs"></div>
        <label class="search-field recipe-search-field" id="recipeSearchField" hidden>
          <span id="recipeSearchLabel">Поиск блюда</span>
          <input id="recipeSearchInput" autocomplete="off">
        </label>
        <div class="dish-list" id="dishList"></div>
      </section>

      <section class="section recipe-book-section" id="recipeBookSection" hidden>
        <div class="section-heading">
          <h2>Рецепты</h2>
          <span id="recipeBookCount">0 блюд</span>
        </div>
        <div class="recipe-list protected-content" id="recipeBookList"></div>
        <button class="primary-button section-action-button" id="recipeNewButton" type="button">Добавить блюдо</button>
        <form class="recipe-editor" id="recipeEditor" hidden>
          <div class="recipe-dish-fields">
            <label>
              <span id="recipeNameRuLabel">Название RU</span>
              <input id="recipeNameRuInput" autocomplete="off">
            </label>
            <label>
              <span id="recipeNameEnLabel">Name EN</span>
              <input id="recipeNameEnInput" autocomplete="off">
            </label>
            <label>
              <span id="recipeCategoryLabel">Категория</span>
              <select id="recipeCategorySelect"></select>
            </label>
            <label>
              <span id="recipePortionsLabel">Порции</span>
              <input id="recipePortionsInput" autocomplete="off">
            </label>
            <label>
              <span id="recipeIconLabel">Иконка</span>
              <input id="recipeIconInput" autocomplete="off">
            </label>
            <label>
              <span id="recipeShelfLifeLabel">Срок хранения</span>
              <input id="recipeShelfLifeInput" autocomplete="off">
            </label>
          </div>
          <div class="recipe-editor-head">
            <span id="recipeIngredientLabel">Продукт</span>
            <span id="recipeQuantityLabel">Кол-во</span>
            <span id="recipeMeasureLabel">Мера</span>
          </div>
          <div class="recipe-editor-list" id="recipeEditorList"></div>
          <div class="recipe-editor-actions">
            <button class="ghost-button" id="recipeAddIngredientButton" type="button">Добавить продукт</button>
            <button class="primary-button" id="recipeSaveButton" type="submit">Сохранить рецепт</button>
            <button class="ghost-button" id="recipeCancelButton" type="button">Отмена</button>
          </div>
        </form>
      </section>

      <section class="section product-catalog-section" id="productCatalogSection" hidden>
        <div class="section-heading">
          <h2>Products</h2>
          <span id="productCatalogCount">0 позиций</span>
        </div>
        <form class="product-form" id="productForm">
          <label>
            <span id="productRuLabel">Название RU</span>
            <input id="productRuInput" autocomplete="off">
          </label>
          <label>
            <span id="productEnLabel">Name EN</span>
            <input id="productEnInput" autocomplete="off">
          </label>
          <label>
            <span id="productUnitLabel">Unit</span>
            <select id="productUnitSelect"></select>
          </label>
          <div class="product-form-actions">
            <button class="primary-button" id="productSaveButton" type="submit">Добавить</button>
            <button class="ghost-button" id="productCancelButton" type="button" hidden>Отмена</button>
          </div>
        </form>
        <label class="search-field">
          <span id="productSearchLabel">Поиск продукта</span>
          <input id="productSearchInput" autocomplete="off">
        </label>
        <div class="product-list" id="productCatalogList"></div>
      </section>

      <section class="section">
        <div class="section-heading">
          <h2>Ингредиенты</h2>
          <span id="selectedCount">0 блюд</span>
        </div>
        <div class="recipe-list" id="recipeList"></div>
      </section>

      <section class="section">
        <div class="section-heading">
          <h2>Проверка продуктов</h2>
          <span id="shoppingCount">0 позиций</span>
        </div>
        <div class="shopping-list" id="shoppingList"></div>
      </section>

      <footer class="footer-actions">
        <button class="primary-button" id="saveButton" type="button">Сохранить план</button>
      </footer>
    </main>

    <template id="dishTemplate">
      <label class="dish-row">
        <input class="dish-checkbox" type="checkbox">
        <span class="dish-icon"></span>
        <span class="dish-name"></span>
        <select class="scale-select" aria-label="Объем приготовления">
          <option value="1">Полный объем</option>
          <option value="0.75">25% меньше</option>
          <option value="0.5">50% меньше</option>
          <option value="0.25">75% меньше</option>
        </select>
      </label>
    </template>

    <template id="recipeTemplate">
      <article class="recipe-block">
        <div class="recipe-title-row">
          <h3></h3>
          <span></span>
        </div>
        <div class="ingredient-grid"></div>
      </article>
    </template>

    <template id="recipeBookTemplate">
      <article class="recipe-block recipe-book-card">
        <div class="recipe-title-row">
          <h3></h3>
          <span></span>
        </div>
        <div class="ingredient-grid"></div>
      </article>
    </template>

    <template id="recipeEditorRowTemplate">
      <div class="recipe-editor-row">
        <select class="recipe-product-select"></select>
        <input class="recipe-quantity-input" inputmode="decimal">
        <select class="recipe-unit-display"></select>
        <button class="product-icon-button recipe-remove-button" type="button">Delete</button>
      </div>
    </template>

    <template id="productTemplate">
      <article class="product-card">
        <div class="product-copy">
          <h3></h3>
          <p class="product-meta product-meta-en"></p>
        </div>
        <div class="product-actions">
          <span class="product-unit"></span>
          <button class="product-icon-button product-edit-button" type="button">Edit</button>
          <button class="product-icon-button product-delete-button" type="button">Delete</button>
        </div>
      </article>
    </template>

    <template id="ingredientTemplate">
      <label class="ingredient-row">
        <span class="ingredient-name"></span>
        <span class="quantity-wrap">
          <input class="quantity-input" inputmode="decimal">
          <span class="unit-label"></span>
        </span>
      </label>
    </template>

    <script src="app.js?v=20260519-shared-json"></script>
  </body>
</html>
